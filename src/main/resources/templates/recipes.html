<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Recipes</title>

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
	rel="stylesheet">
</head>
<body style="background-color: #f9f9f9">

	<div th:replace="~{navbar :: navbar}"></div>

	<div class="container mt-4 d-flex justify-content-center">
		<nav class="navbar navbar-light">
			<form class="form-group row" action="/search" method="get">
				<div class="input-group w-100">

					<span class="input-group-text"> <i class="bi bi-search"></i>
					</span> <input type="text" name="name" class="form-control"
						placeholder="Search">
				</div>
			</form>
		</nav>
	</div>
	<div class="container mt-4">
		<div class="row g-3">
			<div class="col-md-4" th:each="recipe : ${recipes}">
				<div class="card h-100">
					<img src="..." class="card-img-top" alt="Recipe image">
					<div class="card-body">
						<h5 class="card-title" th:text="${recipe.name}">Recipe Name</h5>
						<p class="card-text" th:text="${recipe.description}">Recipe
							description</p>
						<a href="#" class="btn btn-primary">View Recipe</a>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
